# Pre-commit configuration for ProStateKit.
# Run: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        files: \.json$
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.2"
    hooks:
      - id: check-jsonschema
        name: Validate wrapper result examples
        files: ^(schemas/examples/wrapper-result\.valid\.json|evidence/sample/.*/wrapper\.result\.json)$
        args:
          - --schemafile
          - schemas/wrapper-result.schema.json
      - id: check-jsonschema
        name: Validate bundle manifest examples
        files: ^schemas/examples/bundle-manifest\.valid\.json$
        args:
          - --schemafile
          - schemas/bundle-manifest.schema.json
      - id: check-jsonschema
        name: Validate release readiness examples
        files: ^schemas/examples/release-readiness\.valid\.json$
        args:
          - --schemafile
          - schemas/release-readiness.schema.json
      - id: check-metaschema
        name: Self-validate ProStateKit schemas
        files: ^schemas/(wrapper-result|bundle-manifest|release-readiness)\.schema\.json$

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npm run lint:md
        language: system
        pass_filenames: false
        types:
          - markdown
      - id: markdownlint-nested
        name: markdownlint nested fences
        entry: npm run lint:md:nested
        language: system
        pass_filenames: false
        types:
          - markdown
      - id: markdownlint-links
        name: markdownlint local links
        entry: npm run lint:md:links
        language: system
        pass_filenames: false
        types:
          - markdown
