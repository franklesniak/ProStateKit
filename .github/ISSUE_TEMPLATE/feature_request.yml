name: Feature Request
description: Suggest a ProStateKit feature or enhancement.
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
        - label: I will not include secrets, tenant data, customer data, private logs, or unredacted evidence.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runner
        - Intune wrapper
        - ConfigMgr wrapper
        - DSC configuration
        - Evidence schema
        - Exit codes
        - Reboots
        - Secrets
        - Packaging
        - Validation / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What endpoint-state problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
