name: Documentation Issue
description: Report unclear, missing, or outdated ProStateKit documentation.
title: "[Docs] "
labels:
  - documentation
  - triage
body:
  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues for this documentation problem.
          required: true
        - label: This is about documentation content, not a functional code bug.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runner
        - Intune wrapper
        - ConfigMgr wrapper
        - DSC configuration
        - Evidence schema
        - Exit codes
        - Reboots
        - Secrets
        - Packaging
        - Validation / CI
        - Documentation
        - Other
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: README.md, docs/contract.md, docs/runbooks/demo-runbook.md
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: What Is Wrong Or Missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Change
    validations:
      required: false
