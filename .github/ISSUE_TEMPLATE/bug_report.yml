name: Bug Report
description: Report a ProStateKit bug or unexpected behavior.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: >
        Do not paste secrets, tenant identifiers, customer data, private logs,
        unredacted transcripts, full evidence bundles, or security
        vulnerabilities into this form.

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I searched existing issues & this is not a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
        - label: I removed or redacted sensitive data from all excerpts.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runner
        - Intune wrapper
        - ConfigMgr wrapper
        - DSC configuration
        - Evidence schema
        - Exit codes
        - Reboots
        - Secrets
        - Packaging
        - Validation / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and why the observed behavior is wrong.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Runtime / Environment
      render: text
      placeholder: |
        ProStateKit version:
        DSC version:
        PowerShell version:
        Windows version:
        Execution plane: Intune / ConfigMgr / Scheduled Task / local / CI / other
        Run mode: Detect / Remediate
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      render: text
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Redacted Evidence Excerpts
      description: Include only redacted excerpts, not full evidence bundles.
      render: text
      placeholder: |
        summary.txt excerpt:
        wrapper.result.json excerpt:
        dsc.raw.json excerpt:
        Exit code:
        Execution plane:
        reboot.marker existed: yes / no
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
    validations:
      required: false
