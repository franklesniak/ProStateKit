name: Fixture Compatibility

on:
  push:
    branches: ["**"]
    paths:
      - "evidence/**"
      - "schemas/**"
      - "src/**"
      - "tests/**"
      - ".github/workflows/fixture-compat.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "evidence/**"
      - "schemas/**"
      - "src/**"
      - "tests/**"
      - ".github/workflows/fixture-compat.yml"
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixtures:
    name: Schema and fixture compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Validate schemas and fixtures
        shell: pwsh
        run: |
          ./src/tools/Invoke-SchemaLint.ps1
          $result = Invoke-Pester -Path tests/PowerShell -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            exit 1
          }
