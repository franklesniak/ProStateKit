name: Check Placeholders

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-placeholders:
    name: Check placeholder cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for unreplaced template markers
        run: |
          set -euo pipefail

          owner_repo="OWNER""/""REPO"
          owner_handle="@""OWNER"
          contact_placeholder="[INSERT CONTACT ""METHOD]"
          security_placeholder="[security contact ""email]"
          old_slug="copilot""-""repo""-""template"
          old_package="copilot""_""repo""_""template"

          sample_project="my""-""new""-""project"
          sample_repo="your""-""repo""-""name"

          patterns=(
            "$owner_repo"
            "$owner_handle"
            "$contact_placeholder"
            "$security_placeholder"
            "$old_slug"
            "$old_package"
            "$sample_project"
            "$sample_repo"
          )

          found=false
          for pattern in "${patterns[@]}"; do
            matches=$(grep -RInF \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude=.github/workflows/check-placeholders.yml \
              -- "$pattern" . || true)
            if [[ -n "$matches" ]]; then
              echo "::error::Found unreplaced marker: $pattern"
              echo "$matches"
              found=true
            fi
          done

          if [[ "$found" == "true" ]]; then
            exit 1
          fi
