name: Data file linting

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-file-linting:
    name: Data file linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run check-json
        run: pre-commit run check-json --all-files

      - name: Run check-yaml
        run: pre-commit run check-yaml --all-files

      - name: Run yamllint
        run: pre-commit run yamllint --all-files

      - name: Run actionlint
        run: pre-commit run actionlint --all-files

      - name: Run check-jsonschema
        run: pre-commit run check-jsonschema --all-files

      - name: Run check-metaschema
        run: pre-commit run check-metaschema --all-files
