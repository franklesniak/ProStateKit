# yamllint configuration!
#
# The `truthy.check-keys: false` setting is intentional so GitHub Actions
# workflow files can use the idiomatic unquoted `on:` key without yamllint
# flagging it as a truthy value. The `new-lines.type: platform` setting keeps
# local Windows validation compatible with Git's CRLF working-tree conversion
# while Linux CI continues to require LF. The line-length rule is a warning
# because schema descriptions, issue-form text, and documentation links often
# exceed 120 characters and are better reviewed in context.
#
# See https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

rules:
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
  comments-indentation: disable
  document-start:
    present: false
  empty-lines:
    max: 1
    max-start: 0
    max-end: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
    level: warning
  new-line-at-end-of-file: enable
  new-lines:
    type: platform
  trailing-spaces: enable
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: false
